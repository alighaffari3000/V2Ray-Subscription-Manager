name: Build V2RayDAR engine

# Builds the Linux binary of the vendored V2RayDAR scan engine and publishes
# it to a fixed release tag. install.sh downloads this binary so weak VPSes
# never have to compile Rust themselves (falling back to source build only
# when the download fails or the binary is incompatible).

on:
  push:
    branches: [master]
    paths:
      - 'V2RayDAR-main/**'
      - '.github/workflows/build-v2raydar.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # ubuntu-22.04 keeps glibc requirements low (2.35) so the binary also
    # runs on Ubuntu 22.04+ and Debian 12+. Older distros fall back to
    # compiling from source via install.sh.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            V2RayDAR-main/target
          key: cargo-${{ runner.os }}-${{ hashFiles('V2RayDAR-main/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --manifest-path V2RayDAR-main/Cargo.toml

      - name: Smoke-test binary
        # --version alone would still pass if the worker interface broke, and
        # the panel talks to the engine only through `worker`. The mock used by
        # the Python tests ignores argv beyond the mode, so a CLI regression is
        # invisible there — assert it here instead, against the real binary.
        run: |
          set -euo pipefail
          BIN="$PWD/V2RayDAR-main/target/release/v2raydar"
          $BIN --version

          # The exact argv services/automation_service.py builds. Without
          # sing-box the run still exits non-zero, so assert on *why*: a clap
          # parse error means the CLI no longer accepts the panel's call.
          set +e
          err=$(echo '{"schema_version":1,"mode":"discovery","job_id":"ci","sources":[]}' \
            | $BIN worker discovery --fetch-concurrency 1 --probe-concurrency 1 \
                   --probe-process-concurrency 1 2>&1 >/dev/null)
          set -e
          echo "stderr was: $err"
          if grep -qiE "unexpected argument|invalid value|unrecognized|error: " <<<"$err"; then
            echo "::error::CLI rejected the invocation the panel uses"
            exit 1
          fi
          echo "CLI accepts the panel's invocation"

      - name: Verify worker JSON contract end-to-end
        # Needs sing-box, which the engine requires before probing. Kept in its
        # own non-blocking step so an outage at sing-box.app can't stop the
        # binary from being published.
        continue-on-error: true
        run: |
          set -euo pipefail
          BIN="$PWD/V2RayDAR-main/target/release/v2raydar"
          bash -c "$(curl -fsSL https://sing-box.app/install.sh)" -- --beta || \
            bash -c "$(curl -fsSL https://sing-box.app/install.sh)"
          sing-box version

          echo '{"schema_version":1,"mode":"discovery","job_id":"ci","sources":[]}' \
            | $BIN worker discovery --fetch-concurrency 1 --probe-concurrency 1 \
                   --probe-process-concurrency 1 > out.json
          cat out.json
          python3 - <<'PY'
          import json
          d = json.load(open('out.json'))
          assert d['schema_version'] == 1, d
          assert 'success' in d, d
          print('worker contract OK:', d)
          PY

      - name: Stage artifact
        run: cp V2RayDAR-main/target/release/v2raydar v2raydar-linux-amd64

      - name: Publish to fixed release tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2raydar-latest
          name: V2RayDAR engine (auto-built)
          body: |
            Automatically built Linux x86_64 binary of the vendored V2RayDAR scan engine.
            Downloaded by install.sh so the VPS doesn't need to compile Rust.
            Built from commit ${{ github.sha }}.
          files: v2raydar-linux-amd64
